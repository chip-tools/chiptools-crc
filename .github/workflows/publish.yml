name: Publish to PyPI

# Build and publish when a version tag (v*) is pushed.
on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run test suite
        run: python -m pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing: no API token needed, GitHub mints a short-lived
    # OIDC credential. Configure the publisher once on pypi.org first
    # (see repo notes). The 'pypi' environment can add a manual approval gate.
    environment:
      name: pypi
      url: https://pypi.org/project/chiptools-crc/
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
